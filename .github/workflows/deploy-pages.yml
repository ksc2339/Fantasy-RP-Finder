name: Deploy to GitHub Pages

on:
  schedule:
    # Pacific(로스앤젤레스) 기준 00:10에만 배포 실행 (자정 직후 데이터 반영 여유)
    - cron: '*/5 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.midnight.outputs.should_run }}
    steps:
      - name: Check LA midnight
        id: midnight
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          now_la=$(TZ=America/Los_Angeles date +"%H:%M")
          if [ "$now_la" = "00:10" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.midnight.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.midnight.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        if: steps.midnight.outputs.should_run == 'true'
        working-directory: web
        run: npm ci

      - name: Prefetch Savant pitcher data (Whiff%, xERA, xFIP)
        if: steps.midnight.outputs.should_run == 'true'
        working-directory: web
        run: node scripts/generate-savant-data.mjs

      - name: Prefetch FanGraphs xFIP data (sparse scrape)
        if: steps.midnight.outputs.should_run == 'true'
        working-directory: web
        run: node scripts/generate-fangraphs-xfip-data.mjs

      - name: Prefetch FanGraphs OOPSY projections (pitchers)
        if: steps.midnight.outputs.should_run == 'true'
        working-directory: web
        run: node scripts/generate-oopsy-projections.mjs

      - name: Prefetch Roster Resource roles (depth charts)
        if: steps.midnight.outputs.should_run == 'true'
        working-directory: web
        run: node scripts/generate-roster-resource-roles.mjs

      - name: Build
        if: steps.midnight.outputs.should_run == 'true'
        working-directory: web
        run: npm run build

      - name: Configure Pages
        if: steps.midnight.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.midnight.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    if: needs.build.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
